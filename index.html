<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Semáforo</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">

    <header>
      <h1><a href="./">Semáforo</a></h1>
      <div class="subtitle">Alan Parr's Traffic Lights</div>
    </header>

    <div class="status" id="status" aria-live="polite">
      <span class="dot" id="turn-dot"></span>
      <span id="turn-text">Player 1's turn</span>
    </div>

    <div class="board" id="board" role="grid" aria-label="Game board"></div>

    <div class="controls">
      <button class="btn" id="reset">New game</button>
    </div>

    <p class="rules">
      Tap any square to advance it:
      <strong style="color:var(--green)">green</strong> →
      <strong style="color:var(--yellow)">yellow</strong> →
      <strong style="color:var(--red)">red</strong>.
      <br>
      Make three of the same colour in a row, column, or diagonal to win.
    </p>

  </main>

  <script src="script.js"></script>
</body>
</html>
