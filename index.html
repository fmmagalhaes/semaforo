<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Semáforo</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    if (new URLSearchParams(location.search).get('embed') === '1') {
      document.documentElement.classList.add('embed');
    }
  </script>
</head>
<body>
  <main class="app">

    <header>
      <h1><a href="./">Semáforo</a></h1>
      <div class="subtitle">Alan Parr's Traffic Lights</div>
    </header>

    <div class="status" id="status" aria-live="polite">
      <span class="dot" id="turn-dot"></span>
      <span id="turn-text">Player 1's turn</span>
    </div>

    <div class="board-wrap">
      <div class="board" id="board" role="grid" aria-label="Game board">
        <div class="row">
          <button class="cell" role="gridcell" aria-label="Row 1 column 1"><span class="piece"></span></button>
          <button class="cell" role="gridcell" aria-label="Row 1 column 2"><span class="piece"></span></button>
          <button class="cell" role="gridcell" aria-label="Row 1 column 3"><span class="piece"></span></button>
          <button class="cell" role="gridcell" aria-label="Row 1 column 4"><span class="piece"></span></button>
        </div>
        <div class="row">
          <button class="cell" role="gridcell" aria-label="Row 2 column 1"><span class="piece"></span></button>
          <button class="cell" role="gridcell" aria-label="Row 2 column 2"><span class="piece"></span></button>
          <button class="cell" role="gridcell" aria-label="Row 2 column 3"><span class="piece"></span></button>
          <button class="cell" role="gridcell" aria-label="Row 2 column 4"><span class="piece"></span></button>
        </div>
        <div class="row">
          <button class="cell" role="gridcell" aria-label="Row 3 column 1"><span class="piece"></span></button>
          <button class="cell" role="gridcell" aria-label="Row 3 column 2"><span class="piece"></span></button>
          <button class="cell" role="gridcell" aria-label="Row 3 column 3"><span class="piece"></span></button>
          <button class="cell" role="gridcell" aria-label="Row 3 column 4"><span class="piece"></span></button>
        </div>
      </div>
      <button class="play-again" id="reset" hidden>Play again</button>
    </div>

    <div class="modes" role="tablist" aria-label="Game mode">
      <button class="mode-btn" data-mode="pvp" role="tab" aria-selected="false">Local PvP</button>
      <button class="mode-btn active" data-mode="pc" role="tab" aria-selected="true">vs PC</button>
      <button class="mode-btn" data-mode="online" role="tab" aria-selected="false">Online</button>
    </div>

    <div class="online" id="online-panel" hidden>
      <div class="online-status" id="online-status">Setting up…</div>
      <div class="share" id="share" hidden>
        <input type="text" id="share-link" readonly />
        <button class="btn" id="copy">Copy</button>
      </div>
    </div>

    <p class="rules">
      Tap any square to advance it:
      <strong style="color:var(--green)">green</strong> →
      <strong style="color:var(--yellow)">yellow</strong> →
      <strong style="color:var(--red)">red</strong>.
      <br>
      Make three of the same colour in a row, column, or diagonal.
    </p>

  </main>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="script.js"></script>
  <script src="online.js"></script>
</body>
</html>
