<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Semáforo</title>
<style>
  :root{
    --bg:#0f1115;
    --surface:#171a21;
    --surface-2:#1f232c;
    --text:#e7ecf3;
    --muted:#8a93a6;
    --accent:#6ea8ff;
    --green:#22c55e;
    --yellow:#facc15;
    --red:#ef4444;
    --empty:#2a2f3a;
    --shadow:0 10px 30px rgba(0,0,0,.35);
    --radius:18px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 800px at 20% -10%,#1a2030 0%,var(--bg) 60%);
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .app{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
    width:100%;
    max-width:560px;
  }
  header{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    text-align:center;
  }
  h1{
    margin:0;
    font-size:clamp(1.6rem,4.5vw,2.1rem);
    font-weight:600;
    letter-spacing:-0.02em;
  }
  .subtitle{color:var(--muted);font-size:.95rem}
  .status{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    background:var(--surface);
    border:1px solid #232833;
    padding:14px 22px;
    border-radius:999px;
    font-size:1.05rem;
    box-shadow:var(--shadow);
    min-height:52px;
  }
  .dot{
    width:14px;height:14px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 4px rgba(110,168,255,.18);
    transition:background .2s,box-shadow .2s;
  }
  .dot.p2{background:#c084fc;box-shadow:0 0 0 4px rgba(192,132,252,.18)}
  .dot.win{background:var(--green);box-shadow:0 0 0 6px rgba(34,197,94,.22)}
  .board{
    display:flex;
    flex-direction:column;
    gap:14px;
    width:100%;
    padding:18px;
    background:var(--surface);
    border:1px solid #232833;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }
  .row{display:flex;gap:14px}
  .cell{
    flex:1 1 0;
    aspect-ratio:1/1;
    background:var(--surface-2);
    border:none;
    border-radius:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .12s ease,background .25s ease,box-shadow .25s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .cell:hover:not(:disabled){transform:translateY(-2px)}
  .cell:disabled{cursor:not-allowed}
  .piece{
    width:62%;
    height:62%;
    border-radius:50%;
    background:var(--empty);
    transition:background .25s ease,transform .25s ease,box-shadow .25s ease;
    transform:scale(.6);
    opacity:0;
  }
  .cell.green .piece{background:var(--green);opacity:1;transform:scale(1);box-shadow:0 6px 18px rgba(34,197,94,.35)}
  .cell.yellow .piece{background:var(--yellow);opacity:1;transform:scale(1);box-shadow:0 6px 18px rgba(250,204,21,.35)}
  .cell.red .piece{background:var(--red);opacity:1;transform:scale(1);box-shadow:0 6px 18px rgba(239,68,68,.35)}
  .cell.win{box-shadow:inset 0 0 0 3px rgba(255,255,255,.85), 0 8px 24px rgba(255,255,255,.08)}
  .controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  button.btn{
    appearance:none;
    border:1px solid #2a3140;
    background:var(--surface);
    color:var(--text);
    padding:11px 20px;
    border-radius:999px;
    font:inherit;
    font-size:.95rem;
    cursor:pointer;
    transition:background .15s,border-color .15s,transform .1s;
  }
  button.btn:hover{background:#1d212a;border-color:#3a4356}
  button.btn:active{transform:translateY(1px)}
  .rules{
    color:var(--muted);
    font-size:.85rem;
    text-align:center;
    line-height:1.55;
    max-width:480px;
  }
  @media (max-width:420px){
    body{padding:14px}
    .board{padding:12px;gap:10px}
    .row{gap:10px}
    .status{padding:12px 18px;font-size:1rem}
  }
</style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Semáforo</h1>
      <div class="subtitle">Alan Parr's Traffic Lights</div>
    </header>
    <div class="status" id="status" aria-live="polite">
      <span class="dot" id="turn-dot"></span>
      <span id="turn-text">Player 1's turn</span>
    </div>
    <div class="board" id="board" role="grid" aria-label="Game board"></div>
    <div class="controls">
      <button class="btn" id="reset">New game</button>
    </div>
    <p class="rules">Tap any square to advance it: <strong style="color:var(--green)">green</strong> → <strong style="color:var(--yellow)">yellow</strong> → <strong style="color:var(--red)">red</strong>. Make three of the same colour in a row, column, or diagonal to win.</p>
  </main>
<script>
(() => {
  const ROWS = 3, COLS = 4;
  const STATES = ['empty','green','yellow','red'];
  const board = document.getElementById('board');
  const statusText = document.getElementById('turn-text');
  const turnDot = document.getElementById('turn-dot');
  const resetBtn = document.getElementById('reset');
  let grid, player, over, cells;

  function build(){
    board.innerHTML = '';
    cells = [];
    for(let r=0;r<ROWS;r++){
      const row = document.createElement('div');
      row.className = 'row';
      const rowCells = [];
      for(let c=0;c<COLS;c++){
        const btn = document.createElement('button');
        btn.className = 'cell';
        btn.setAttribute('role','gridcell');
        btn.setAttribute('aria-label',`Row ${r+1} column ${c+1}`);
        const piece = document.createElement('span');
        piece.className = 'piece';
        btn.appendChild(piece);
        btn.addEventListener('click',()=>play(r,c));
        row.appendChild(btn);
        rowCells.push(btn);
      }
      board.appendChild(row);
      cells.push(rowCells);
    }
  }

  function reset(){
    grid = Array.from({length:ROWS},()=>Array(COLS).fill(0));
    player = 1;
    over = false;
    for(const row of cells) for(const c of row){
      c.classList.remove('green','yellow','red','win');
      c.disabled = false;
    }
    updateStatus();
  }

  function updateStatus(winnerLine){
    turnDot.classList.remove('p2','win');
    if(over){
      if(winnerLine){
        turnDot.classList.add('win');
        statusText.textContent = `Player ${player} wins!`;
      }else{
        statusText.textContent = 'Draw';
      }
      return;
    }
    if(player===2) turnDot.classList.add('p2');
    statusText.textContent = `Player ${player}'s turn`;
  }

  function play(r,c){
    if(over) return;
    if(grid[r][c] >= 3) return;
    grid[r][c] += 1;
    const cell = cells[r][c];
    cell.classList.remove('green','yellow','red');
    cell.classList.add(STATES[grid[r][c]]);
    if(grid[r][c] === 3) cell.disabled = true;
    const line = findWin();
    if(line){
      over = true;
      for(const [wr,wc] of line) cells[wr][wc].classList.add('win');
      for(const row of cells) for(const c2 of row) c2.disabled = true;
      updateStatus(line);
      return;
    }
    if(isFull()){
      over = true;
      updateStatus(null);
      return;
    }
    player = player === 1 ? 2 : 1;
    updateStatus();
  }

  function isFull(){
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
      if(grid[r][c] < 3) return false;
    return true;
  }

  function findWin(){
    const lines = [];
    for(let r=0;r<ROWS;r++)
      for(let c=0;c<=COLS-3;c++)
        lines.push([[r,c],[r,c+1],[r,c+2]]);
    for(let c=0;c<COLS;c++)
      for(let r=0;r<=ROWS-3;r++)
        lines.push([[r,c],[r+1,c],[r+2,c]]);
    for(let r=0;r<=ROWS-3;r++)
      for(let c=0;c<=COLS-3;c++){
        lines.push([[r,c],[r+1,c+1],[r+2,c+2]]);
        lines.push([[r,c+2],[r+1,c+1],[r+2,c]]);
      }
    for(const line of lines){
      const [a,b,d] = line;
      const v = grid[a[0]][a[1]];
      if(v!==0 && v===grid[b[0]][b[1]] && v===grid[d[0]][d[1]]) return line;
    }
    return null;
  }

  resetBtn.addEventListener('click',reset);
  build();
  reset();
})();
</script>
</body>
</html>
